function applyPendingContractSync() {
  const state = _pendingContractSync;
  if (!state) { alert('沒有待執行的同步'); return; }
  const { preview } = state;
  const t = today();
  let added = 0, updated = 0, orphanDemoted = 0, orphanDeleted = 0;

  // 讀使用者選的孤兒處理方式
  const orphanRadio = document.querySelector('input[name="orphanAction"]:checked');
  const orphanAction = orphanRadio ? orphanRadio.value : 'none';

  preview.update.forEach(({ recordId, p, existing }) => {
    const idx = db.customers.findIndex(c => c.id === existing.id);
    if (idx < 0) return;
    const cu = db.customers[idx];
    // public 欄位:有值就更新(form 7 是 SoT)
    if (p.customerCode) cu.customerCode = p.customerCode;
    if (p.oikidUserId) cu.oikidUserId = p.oikidUserId;
    if (p.oikidRagicId) cu.oikidRagicId = p.oikidRagicId;
    if (p.mccCode && !cu.callCenterCode) cu.callCenterCode = p.mccCode;
    if (p.childName) cu.childName = p.childName;
    if (p.childEnglishName) cu.childEnglishName = p.childEnglishName;
    if (p.parentName) cu.parentName = p.parentName;
    if (p.parentContact) cu.parentContact = p.parentContact;
    if (p.parentPhone) cu.parentPhone = p.parentPhone;
    if (p.childAge) cu.childAge = p.childAge;
    if (p.childEnglishLevel) cu.childEnglishLevel = p.childEnglishLevel;
    cu.ragicContractRecordId = recordId;
    if (cu.status !== '成交' && cu.status !== '流失') cu.status = '成交';
    cu.updatedAt = t;
    updated++;
  });

  preview.add.forEach(({ recordId, p }) => {
    const noteParts = [];
    if (p.salesName) noteParts.push('業務:' + p.salesName);
    if (p.siblings) noteParts.push('兄弟姐妹:' + p.siblings);
    db.customers.push({
      id: uid(),
      source: 'contract',
      ragicContractRecordId: recordId,
      customerCode: p.customerCode || '',
      oikidUserId: p.oikidUserId || '',
      oikidRagicId: p.oikidRagicId || '',
      callCenterCode: p.mccCode || '',
      parentName: p.parentName || '',
      parentContact: p.parentContact || '',
      contactType: (p.parentContact || '').includes('@') ? 'Email' : '',
      parentPhone: p.parentPhone || '',
      childName: p.childName || '',
      childEnglishName: p.childEnglishName || '',
      childAge: p.childAge || '',
      childEnglishLevel: p.childEnglishLevel || '',
      status: '成交',
      notes: noteParts.join('\n'),
      interactions: [],
      createdAt: (p.joinDate || '').slice(0, 10) || t,
      updatedAt: t
    });
    added++;
  });

  // 處理孤兒:CRM 是成交但 Ragic form 7 沒對應的記錄
  // 預設「降回考慮中」— 因為它們本來就不是真合約成交(常見:兄弟姊妹一起體驗,只有一個簽約)
  if (orphanAction !== 'none' && state.orphans && state.orphans.length > 0) {
    state.orphans.forEach(orphan => {
      const idx = db.customers.findIndex(c => c.id === orphan.id);
      if (idx < 0) return;
      const cu = db.customers[idx];
      if (orphanAction === 'demote') {
        cu.status = '考慮中';
        cu.updatedAt = t;
        orphanDemoted++;
      } else if (orphanAction === 'delete') {
        cu._deleted = true;
        cu.updatedAt = t;
        orphanDeleted++;
      }
    });
  }

  saveData();

  // 同步完自動跑「同類重複合併」— 只在客戶名單 tab 範圍(成交/流失),
  // 永遠不跨到預約 tab。這處理掉「同 key 多筆 CRM 紀錄,sync 只 update 到其中一筆」的問題。
  const dedupResult = autoMergeContractDuplicatesSilent();

  closeModal();
  _pendingContractSync = null;
  let alertMsg = '✅ 合約同步完成\n\n' +
    '新增成交客戶:' + added + '\n' +
    '更新:' + updated + '\n';

  if (state.orphans && state.orphans.length > 0) {
    if (orphanAction === 'demote') {
      alertMsg += '🔻 孤兒降回考慮中:' + orphanDemoted + ' 筆(移到預約客戶 tab)\n';
    } else if (orphanAction === 'delete') {
      alertMsg += '🗑️ 孤兒軟刪:' + orphanDeleted + ' 筆\n';
    } else {
      alertMsg += '⏸️ 孤兒不動:' + state.orphans.length + ' 筆(留在客戶名單)\n';
    }
  }

  if (dedupResult.mergedGroups > 0) {
    alertMsg += '\n🔥 自動合併 ' + dedupResult.mergedGroups + ' 組重複(共軟刪 ' + dedupResult.deletedTotal + ' 筆)';
  } else {
    alertMsg += '\n✓ 沒找到重複客戶';
  }
  alertMsg += '\n\n📸 出包可從「📸 快照備份」還原。';
  alert(alertMsg);
  if (typeof render === 'function') render();
}

// 合約同步後跑的「同類靜默合併」— 只動客戶名單 tab(成交/流失)
// 不跨類(不會把預約客戶併進成交),不跳對話框讓 user 看詳情(因為剛剛 sync 預覽已經看過)
function autoMergeContractDuplicatesSilent() {
  const groups = findDuplicateCustomers();
  let mergedGroups = 0, deletedTotal = 0;
  groups.forEach(g => {
    // 只合併「全部都成交/流失」的群組
    const allDeal = g.every(c => PROSPECT_STATUSES.indexOf(c.status) < 0);
    if (!allDeal) return;
    const r = mergeOneGroup(g);
    mergedGroups++;
    deletedTotal += r.deletedCount;
  });
  if (mergedGroups > 0) saveData();
  return { mergedGroups: mergedGroups, deletedTotal: deletedTotal };
}

async function findRagicDemoRecordId(customerId) {
  const c = db.customers.find(x => x.id === customerId);
  if (!c) return;
  if (!c.callCenterCode) {
    alert('❌ 這位客戶沒有 callCenterCode (Call Center 客戶編號 BHAL...)\n\n無法用 MCC客編 配對。請手動填 Ragic Record ID。');
    return;
  }
  toast('⏳ 拉 Ragic form 2 中(全頁)...');
  try {
    // listPage=0&limit=10000 強制抓全部分頁;timeout 拉到 60 秒(以防 DEMO 紀錄多)
    const resp = await ragicFetchViaExt('https://ap7.ragic.com/oikid/forms/2?api&listPage=0&limit=10000', { method: 'GET', timeout: 60000 });
    if (!resp.ok) { alert('❌ 拉 Ragic form 2 失敗: HTTP ' + (resp.status || 'undefined') + '\n' + (resp.error || '')); return; }
    const data = resp.data || {};
    const matches = [];
    Object.keys(data).forEach(recordId => {
      const rec = data[recordId] || {};
      const mcc = (rec['MCC客編'] || '').trim();
      if (mcc === c.callCenterCode) {
        matches.push({
          id: recordId,
          demoDate: rec['DEMO日期'] || '',
          attendance: rec['出席結果'] || '',
          teacher: rec['老師 Teacher'] || rec['老師'] || '',
          childName: rec['兒童中文姓名'] || rec['兒童英文姓名'] || ''
        });
      }
    });
    if (!matches.length) {
      alert('❌ 找不到 MCC客編 = ' + c.callCenterCode + ' 的 Demo 紀錄\n\n可能:\n1. Ragic 那邊還沒建這位客戶的 Demo record\n2. MCC客編欄位是空的\n3. 不是你建立/指派給你的 record(API 看不到別人的)');
      return;
    }
    let pick;
    if (matches.length === 1) {
      pick = matches[0];
      const ok = confirm('找到 1 筆:\n\nDEMO日期: ' + pick.demoDate + '\n出席: ' + pick.attendance + '\n老師: ' + pick.teacher + '\n學員: ' + pick.childName + '\nRecord ID: ' + pick.id + '\n\n確認用這筆?');
      if (!ok) return;
    } else {
      const list = matches.map((m, i) =>
        (i+1) + '. ' + m.demoDate + ' | ' + m.attendance + ' | ' + m.teacher + ' | ' + m.childName + ' (ID: ' + m.id + ')'
      ).join('\n');
      const input = prompt('找到 ' + matches.length + ' 筆候選,輸入編號(1-' + matches.length + '):\n\n' + list);
      const idx = parseInt(input) - 1;
      if (isNaN(idx) || !matches[idx]) { toast('已取消'); return; }
      pick = matches[idx];
    }
    document.getElementById('tcm_record_id').value = pick.id;
    toast('✅ 已填入 Record ID: ' + pick.id);
  } catch (e) {
    alert('❌ 錯誤: ' + e.message);
    console.error(e);
  }
}

async function readDemoFromClipboardToForm() {
  let raw = '';
  try {
    raw = (await navigator.clipboard.readText()) || '';
  } catch (e) {
    alert('❌ 讀剪貼簿失敗:' + e.message + '\n\n請手動 Ctrl+V 貼到 DEMO 結果欄位。');
    return;
  }
  raw = raw.trim();
  if (!raw) { alert('剪貼簿是空的。請先在 OIKID 點書籤 4 抓資料。'); return; }
  let data;
  try { data = JSON.parse(raw); }
  catch (e) { alert('❌ 剪貼簿不是 JSON 格式。內容前 100 字:\n' + raw.slice(0, 100)); return; }

  if (data.teacher) document.getElementById('tcm_teacher').value = data.teacher;
  if (data.level) {
    const sel = document.getElementById('tcm_level');
    if (sel) sel.value = String(data.level);
  }
  if (data.assess) document.getElementById('tcm_demo_result').value = data.assess;

  toast('✅ 已自動填入(請確認 Ragic Record ID 還要手填)');
}

async function submitTrialCompleteForCustomer(customerId) {
  const c = db.customers.find(x => x.id === customerId);
  if (!c) return;

  const recordId = (val('tcm_record_id') || '').trim();
  const teacher = (val('tcm_teacher') || '').trim();
  const level = val('tcm_level');
  const demoResult = (val('tcm_demo_result') || '').trim();

  if (!recordId) { alert('請填 Ragic Demo Record ID'); return; }
  if (!teacher) { alert('請填老師'); return; }

  if (!confirm('確認寫入?\n\n出席結果 = 已出席\n老師 = ' + teacher + '\nLv = ' + level + '\nDEMO 結果 = ' + (demoResult || '(空)') + '\n\nCRM 客戶狀態會改成「試聽完成」。')) return;

  const url = 'https://ap7.ragic.com/oikid/forms/2/' + encodeURIComponent(recordId) + '?api';
  const fields = {
    '1001548': '已出席',
    '1001550': teacher,
    '1001552': level,
    '1001554': demoResult
  };
  const body = Object.keys(fields).map(k => k + '=' + encodeURIComponent(fields[k])).join('&');

  toast('⏳ 寫入 Ragic...');

  try {
    const resp = await ragicFetchViaExt(url, { method: 'POST', body: body });
    var ragicMsg = (resp.data && resp.data.msg ? String(resp.data.msg) : '').replace(/&nbsp;/g, '').trim();
    var isTrueSuccess = resp.ok && resp.data && resp.data.status === 'SUCCESS' && !ragicMsg.toLowerCase().includes('not found');

    if (!isTrueSuccess) {
      alert('❌ Ragic 寫入失敗\n\nHTTP: ' + resp.status + '\nMsg: ' + (ragicMsg || resp.error || '無'));
      return;
    }

    // 更新 CRM
    c.ragicDemoRecordId = recordId;
    c.status = '試聽完成';
    c.trialResult = demoResult;
    c.trialTeacher = teacher;
    c.trialLevel = level;
    c.trialCompletedAt = today();
    c.updatedAt = today();
    saveData();

    toast('✅ 試聽完成已寫入 Ragic + CRM 狀態更新');
    closeModal();

    // 重新渲染當前畫面
    const viewEl = document.getElementById('view');
    if (currentView === 'prospects') renderProspects(viewEl);
    else if (currentView === 'customers') renderCustomers(viewEl);
  } catch (err) {
    alert('❌ 例外:' + (err && err.message ? err.message : String(err)));
  }
}

function isHistoryAttended(h) {
  if (!h) return false;
  // 1. 如果使用者已手動標記過 (attended === true 或 false),以那個為準
  if (h.attended === true) return true;
  if (h.attended === false) return false;
  // 2. 否則看 attendedAt 是不是真的時間戳(YYYY-MM-DD 格式)
  //    舊版會把「無出席紀錄」這種文字也存進來,所以要過濾
  if (h.attendedAt && /\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(h.attendedAt) &&
      !/無出席紀錄|未出席|無紀錄/.test(h.attendedAt)) {
    return true;
  }
  // 3. 都沒線索 → 未出席
  //    注意:不再用 bookedAt 或 classroom 判斷(因為兩者在已上/未上都會有)
  return false;
}

// ============ 時間軸 ============
// 把 interactions(對話紀錄) + bookingHistory(訂課) 混合,
// 依日期(降冪)顯示。預設打開的 tab。
// 時間軸篩選:'all' | 'log' | 'class' | 'pending'
let timelineFilter = 'all';
function setTimelineFilter(f, customerId) {
  timelineFilter = f;
  renderCustomerDetail(customerId);
}

function renderTimelineTab(c, interactions, bookingHistory) {
  // 將兩種資料統一成 timeline event
  const items = [];

  interactions.forEach(i => {
    items.push({
      kind: 'log',
      date: i.date || '',
      time: '',
      sortKey: (i.date || '') + ' 99:99',  // 對話紀錄沒時間,排同日的最後
      title: i.type || '紀錄',
      body: i.summary || '',
      raw: i
    });
  });

  bookingHistory.forEach(h => {
    const attended = isHistoryAttended(h);
    items.push({
      kind: attended ? 'class' : 'pending',
      date: h.date || '',
      time: h.time || '',
      sortKey: (h.date || '') + ' ' + (h.time || '00:00'),
      title: attended ? '✅ 已上課' : '⏰ 已預約',
      body: [
        h.teacher ? '👨‍🏫 ' + h.teacher : '',
        h.classroom ? '📚 ' + h.classroom : '',
        h.course ? h.course : ''
      ].filter(Boolean).join(' · '),
      raw: h
    });
  });

  // 依 sortKey 降冪(最新在上)
  items.sort((a, b) => (b.sortKey || '').localeCompare(a.sortKey || ''));

  const cntLog = items.filter(x => x.kind === 'log').length;
  const cntClass = items.filter(x => x.kind === 'class').length;
  const cntPending = items.filter(x => x.kind === 'pending').length;

  // 套篩選
  const filtered = timelineFilter === 'all' ? items : items.filter(x => x.kind === timelineFilter);

  if (items.length === 0) {
    return `
      <div class="timeline-empty">
        還沒有任何紀錄。<br>
        切到「💬 對話紀錄」加家長聯繫紀錄,或「📅 訂課歷史」同步 OIKID 訂課。
      </div>
    `;
  }

  // 篩選按鈕
  const filterBtn = (key, label, count) => `
    <button class="timeline-filter-btn ${timelineFilter===key?'active':''}" onclick="setTimelineFilter('${key}','${c.id}')">${label} (${count})</button>
  `;

  return `
    <div class="timeline-filters">
      ${filterBtn('all', '全部', items.length)}
      ${filterBtn('log', '💬 對話', cntLog)}
      ${filterBtn('class', '✅ 已上', cntClass)}
      ${filterBtn('pending', '⏰ 未上', cntPending)}
    </div>
    ${filtered.length === 0 ? `
      <div class="timeline-empty" style="margin-top:10px;">
        這個分類沒有資料,點上面的「全部」看所有紀錄
      </div>
    ` : `
      <div class="timeline">
        ${filtered.map(it => {
          const tagText = it.kind === 'log' ? '對話' : it.kind === 'class' ? '已上' : '未上';
          const dateLabel = (it.date || '—') + (it.time ? ' ' + it.time : '');
          return `
            <div class="timeline-item tl-${it.kind}">
              <div class="timeline-meta">
                <span class="tl-tag tl-${it.kind}">${tagText}</span>
                <span>${escapeHtml(dateLabel)}</span>
                <span style="color:var(--text-light);">·</span>
                <span>${escapeHtml(it.title)}</span>
              </div>
              ${it.body ? `<div class="timeline-body">${escapeHtml(it.body).replace(/\n/g,'<br>')}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `}
  `;
}

function switchDetailTab(tab, id) {
  customerDetailTab = tab;
  renderCustomerDetail(id);
}

// ============ 客戶旗標(需主動訂課置頂)============
function toggleCustomerFlag(id) {
  const c = db.customers.find(x => x.id === id);
  if (!c) return;
  c.flagged = !c.flagged;
  c.updatedAt = today();
  saveData();
  toast(c.flagged ? '🚩 已標記' : '🏳️ 已取消標記');
  // 在客戶名單頁:重新渲染列表(置頂順序會變)
  if (currentView === 'customers') {
    const viewEl = document.getElementById('view');
    if (viewEl) renderCustomers(viewEl);
  }
  // 客戶詳情 modal 開著時:重新渲染詳情(按鈕顏色更新)
  const modal = document.getElementById('modal');
  if (modal && modal.classList.contains('show')) {
    renderCustomerDetail(id);
  }
}

function switchHistorySubTab(sub, id) {
  historySubTab = sub;
  renderCustomerDetail(id);
}

function addInteraction(id) {
  const date = val('i_date'), type = val('i_type'), summary = val('i_summary');
  if (!summary) { alert('請輸入內容'); return; }
  const c = db.customers.find(x => x.id === id);
  c.interactions = c.interactions || [];
  c.interactions.push({ date, type, summary });
  c.updatedAt = today();
  saveData();
  renderCustomerDetail(id);
  toast('已新增紀錄');
}

// ============ Call Center 短備註生成 ============
// 工作流:CRM 寫完詳細紀錄 → 這裡生成 Call Center 流水帳片段 → 複製貼回公司系統
// 格式範例:`4/27 NA`、`4/27 已約5/1 1900`、`4/27 預算問題`
// 同日多次(NA*2)、舊紀錄串接(/ 分隔)由用戶手動處理
function ccPrefix() {
  const d = new Date();
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ';
}
function ccInsert(text) {
  const el = document.getElementById('cc_note_input');
  if (!el) return;
  el.value = ccPrefix() + text;
  el.focus();
  el.setSelectionRange(el.value.length, el.value.length);
}
function ccCopy() {
  const el = document.getElementById('cc_note_input');
  if (!el) return;
  const text = el.value.trim();
  if (!text || text === ccPrefix().trim()) { toast('內容是空的'); return; }
  copyToClipboard(text, '✅ 已複製短備註');
}

function addBookingHistory(customerId) {
  const date = val('h_date'), time = val('h_time'), teacher = val('h_teacher');
  if (!date && !time && !teacher) { alert('至少填一個欄位'); return; }
  const c = db.customers.find(x => x.id === customerId);
  c.bookingHistory = c.bookingHistory || [];
  c.bookingHistory.push({
    id: uid(), date, time, teacher,
    capturedAt: new Date().toISOString().slice(0, 19)
  });
  c.updatedAt = today();
  saveData();
  renderCustomerDetail(customerId);
  toast('已新增訂課紀錄');
}

function deleteBookingHistory(customerId, hid) {
  if (!confirm('刪除這筆訂課紀錄?')) return;
  const c = db.customers.find(x => x.id === customerId);
  if (!c) return;
  softDeleteSubItem(c, 'bookingHistory', hid);
  c.updatedAt = today();
  saveData();
  renderCustomerDetail(customerId);
  toast('已刪除');
}

// 手動切換某筆訂課的出席狀態(已上 ↔ 未上)
function toggleBookingAttendance(customerId, hid) {
  const c = db.customers.find(x => x.id === customerId);
  if (!c) return;
  const h = (c.bookingHistory || []).find(x => x.id === hid);
  if (!h) return;
  // 翻轉。明確設成 true/false(不靠 attendedAt 判斷,讓使用者有最終決定權)
  const wasAttended = isHistoryAttended(h);
  h.attended = !wasAttended;
  // 如果被改成「已上」但沒 attendedAt,寫一個今天日期當佔位;改成「未上」就清掉
  if (h.attended) {
    if (!h.attendedAt || !/\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(h.attendedAt)) {
      h.attendedAt = today() + ' (手動標記)';
    }
  } else {
    // 不刪掉 attendedAt(保留原始抓到的字串給除錯用),但 isHistoryAttended 會優先看 attended:false
  }
  c.updatedAt = today();
  saveData();
  renderCustomerDetail(customerId);
  toast(h.attended ? '✅ 標記為已上' : '⏰ 標記為未上');
}

// 強制把這位客戶所有訂課歷史標成已上 / 未上(救援用,當自動判斷壞掉時)
function forceMarkAllAttendance(customerId, attended) {
  const c = db.customers.find(x => x.id === customerId);
  if (!c || !Array.isArray(c.bookingHistory)) return;
  const visible = c.bookingHistory.filter(h => !h._deleted);
  const verb = attended ? '已上' : '未上';
  if (!confirm('確定把「' + (c.childName || c.parentName) + '」的全部 ' + visible.length + ' 筆訂課都改成「' + verb + '」?\n\n(只影響這個分頁顯示,不會動 OIKID 後台)')) return;
  visible.forEach(h => {
    h.attended = !!attended;
    if (attended) {
      if (!h.attendedAt || !/\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(h.attendedAt)) {
        h.attendedAt = today() + ' (手動標記)';
      }
    }
  });
  c.updatedAt = today();
  saveData();
  renderCustomerDetail(customerId);
  toast('✅ 已強制標記 ' + visible.length + ' 筆為「' + verb + '」');
}

// 一鍵把這位客戶的所有 bookingHistory 重新依「attendedAt 是否為真時間戳」判斷出席
// 用來修正 v4.0 之前舊資料(舊 isHistoryAttended 會把所有 bookedAt 都當已上)
function reclassifyBookingAttendance(customerId) {
  const c = db.customers.find(x => x.id === customerId);
  if (!c || !Array.isArray(c.bookingHistory)) return;
  let changed = 0;
  c.bookingHistory.forEach(h => {
    if (h._deleted) return;
    // 若使用者已手動 toggle 過(attended 是明確 true/false),尊重那個結果
    // 用 typeof + 確認不是被舊邏輯寫進來的「強制 true」很難,所以這裡直接重算覆蓋
    const hasReal = h.attendedAt
      && /\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(h.attendedAt)
      && !/無出席紀錄|未出席|無紀錄|手動標記/.test(h.attendedAt);
    const newVal = !!hasReal;
    if (h.attended !== newVal) {
      h.attended = newVal;
      changed++;
    }
  });
  if (changed > 0) {
    c.updatedAt = today();
    saveData();
    toast('✅ 已重判 ' + changed + ' 筆出席狀態');
  } else {
    toast('沒有需要重判的紀錄');
  }
  renderCustomerDetail(customerId);
}

async function syncBookingFromClipboard(customerId) {
  const c = db.customers.find(x => x.id === customerId);
  if (!c) return;

  let text = '';
  try {
    text = await navigator.clipboard.readText();
  } catch (e) {
    alert('❌ 瀏覽器擋住讀取剪貼簿,請按下方「允許」或重試');
    return;
  }
  if (!text) { alert('剪貼簿是空的'); return; }

  let data;
  try { data = JSON.parse(text); }
  catch (e) {
    alert('剪貼簿內容不是 JSON。\n請先在 OIKID 按「📥 同步 N 筆訂課到工作台」(綠色浮動按鈕)\n或在訂課日曆點「可預約」');
    return;
  }

  if (data.email && c.parentContact && data.email.toLowerCase() !== c.parentContact.toLowerCase()) {
    if (!confirm('⚠️ Email 不一致\n剪貼簿:' + data.email + '\n此客戶:' + c.parentContact + '\n\n仍要存到這位客戶?')) return;
  }

  c.bookingHistory = c.bookingHistory || [];

  // 單筆新訂課 (從「可預約」click 捕捉)
  if (data.type === 'oikid_booking') {
    c.bookingHistory.push({
      id: uid(),
      date: data.date || '',
      time: data.time || '',
      teacher: data.teacher || '',
      course: '',
      classroom: '',
      attended: false,
      capturedAt: data.at || new Date().toISOString().slice(0, 19)
    });
    c.updatedAt = today();
    saveData();
    customerDetailTab = 'history';
    renderCustomerDetail(customerId);
    toast('✅ 已寫入:' + (data.teacher || '?') + ' / ' + data.date + ' ' + data.time);
    return;
  }

  // 批次歷史 (從「已預約課表」+「學習紀錄」抓取)
  if (data.type === 'oikid_booking_history') {
    const entries = data.entries || [];
    if (entries.length === 0) { alert('沒有訂課資料'); return; }
    if (!confirm('要匯入 ' + entries.length + ' 筆訂課紀錄到「' + (c.childName || c.parentName) + '」?\n會自動跳過重複的(以 日期+老師 比對)。')) return;

    let added = 0, skipped = 0;
    entries.forEach(function (e) {
      const key = (e.date || '') + '|' + (e.teacher || '');
      const exists = c.bookingHistory.some(function (h) {
        return ((h.date || '') + '|' + (h.teacher || '')) === key;
      });
      if (exists) { skipped++; return; }
      c.bookingHistory.push({
        id: uid(),
        date: e.date || '',
        time: '',
        teacher: e.teacher || '',
        course: e.course || '',
        classroom: e.classroom || '',
        attended: !!e.attended,
        attendedAt: e.attendedAt || '',
        bookedAt: e.bookedAt || '',
        entryRaw: e.entryRaw || '',
        capturedAt: data.capturedAt || new Date().toISOString().slice(0, 19)
      });
      added++;
    });
    c.updatedAt = today();
    saveData();
    customerDetailTab = 'history';
    renderCustomerDetail(customerId);
    toast('✅ 新增 ' + added + ' 筆,跳過 ' + skipped + ' 筆已存在');
    return;
  }

  alert('未知的資料類型:' + data.type);
}

// ============ v4.0 跨分頁自動同步 ============
// 由瀏覽器擴充呼叫,把 OIKID 傳來的 payload 自動寫入正確客戶
// 不彈 confirm、不彈 alert,直接寫入並用 toast 提示
window.syncBookingFromExtension = function (payload) {
  try {
    if (!payload || typeof payload !== 'object') {
      return { ok: false, reason: 'invalid_payload' };
    }

    // 用 email + userId + name 三層比對,找到目標客戶
    const targetCustomer = findCustomerForSync(payload);

    if (!targetCustomer) {
      // 沒對到客戶,寫到剪貼簿讓使用者手動處理
      try {
        navigator.clipboard.writeText(JSON.stringify(payload));
      } catch (e) {}
      toast('⚠️ 找不到對應客戶 (Email: ' + (payload.email || '?') + '),已備份到剪貼簿');
      return { ok: false, reason: 'no_matching_customer' };
    }

    targetCustomer.bookingHistory = targetCustomer.bookingHistory || [];

    if (payload.type === 'oikid_booking') {
      // 單筆新訂課 (可預約 click 捕捉)
      targetCustomer.bookingHistory.push({
        id: uid(),
        date: payload.date || '',
        time: payload.time || '',
        teacher: payload.teacher || '',
        course: '',
        classroom: '',
        attended: false,
        capturedAt: payload.at || new Date().toISOString().slice(0, 19)
      });
      targetCustomer.updatedAt = today();
      saveData();
      // 如果客戶詳情視窗目前打開的就是這位,刷新它
      if (typeof customerDetailTab !== 'undefined' && document.getElementById('modalContent')) {
        try { renderCustomerDetail(targetCustomer.id); } catch (e) {}
      }
      toast('✅ ' + (targetCustomer.childName || targetCustomer.parentName) + ' 新增 1 筆訂課:' + (payload.teacher || '?'));
      return { ok: true, count: 1, customerId: targetCustomer.id };
    }

    if (payload.type === 'oikid_booking_history') {
      const entries = payload.entries || [];
      if (entries.length === 0) {
        return { ok: false, reason: 'empty_entries' };
      }

      let added = 0, skipped = 0;
      entries.forEach(function (e) {
        const key = (e.date || '') + '|' + (e.teacher || '');
        const exists = targetCustomer.bookingHistory.some(function (h) {
          return ((h.date || '') + '|' + (h.teacher || '')) === key;
        });
        if (exists) { skipped++; return; }
        targetCustomer.bookingHistory.push({
          id: uid(),
          date: e.date || '',
          time: '',
          teacher: e.teacher || '',
          course: e.course || '',
          classroom: e.classroom || '',
          attended: !!e.attended,
          attendedAt: e.attendedAt || '',
          bookedAt: e.bookedAt || '',
          entryRaw: e.entryRaw || '',
          capturedAt: payload.capturedAt || new Date().toISOString().slice(0, 19)
        });
        added++;
      });

      targetCustomer.updatedAt = today();
      saveData();

      // 自動刷新清單(如果 CRM 在客戶頁,確保看得到新資料)
      try {
        if (typeof renderApp === 'function') renderApp();
      } catch (e) {}

      const studentName = targetCustomer.childName || targetCustomer.parentName || '?';
      toast('✅ 已自動同步到「' + studentName + '」:新增 ' + added + ' 筆 / 跳過 ' + skipped + ' 筆已存在');
      return { ok: true, added: added, skipped: skipped, customerId: targetCustomer.id };
    }

    return { ok: false, reason: 'unknown_type', detail: payload.type };

  } catch (err) {
    console.error('[syncBookingFromExtension] error:', err);
    return { ok: false, reason: 'exception', error: String(err) };
  }
};

// 找客戶:三層比對(userId > email + name > email 唯一)
function findCustomerForSync(payload) {
  if (!db || !db.customers) return null;
  // 過濾已軟刪的(避免訂課寫到已刪客戶身上)
  const list = activeCustomers();

  // Layer 1:OIKID UserID 完全相符(最可靠)
  if (payload.userId) {
    const uid = String(payload.userId).trim();
    const byUserId = list.find(function (c) {
      return c.oikidUserId && String(c.oikidUserId).trim() === uid;
    });
    if (byUserId) return byUserId;
  }

  // Layer 2:email + name 都相符
  if (payload.email && payload.name) {
    const emailLower = payload.email.toLowerCase();
    const nameLower = payload.name.toLowerCase();
    const both = list.find(function (c) {
      const ce = (c.parentContact || '').toLowerCase();
      const cn = (c.childName || '').toLowerCase();
      return ce === emailLower && cn === nameLower;
    });
    if (both) return both;
  }

  // Layer 3:email 唯一相符
  if (payload.email) {
    const emailLower = payload.email.toLowerCase();
    const matches = list.filter(function (c) {
      return (c.parentContact || '').toLowerCase() === emailLower;
    });
    if (matches.length === 1) return matches[0];
    // 多筆 email 一樣就放棄,要求人工(因為自動寫入太危險)
  }

  return null;
}

function parsePaste() {
  const raw = document.getElementById('pasteArea').value.trim();
  if (!raw) { alert('請先貼上資料'); return; }

  const lines = raw.split(/\r?\n/).filter(l => l.trim());
  const rows = lines.map(line => line.split(/\t/));

  // ========== 自動識別欄位 ==========
  // 支援三種來源:
  //   (A) Ragic 抓取書籤輸出: header 是「客戶代號\tMCC編號\t兒童中文姓名\t...」
  //   (B) OIKID 後台複製: 標題可能是「UserID\tRagicUID\t加入時間\t帳號\t全名\t...」
  //   (C) 沒標題列: 用欄位順序猜(舊行為,當作 OIKID 順序)

  const headerKeywords = {
    // 標準化欄名 → 可能的標題文字 (regex,case-insensitive)
    customerCode:    /^(客戶代號|客代|customer.?code)$/i,
    mccCode:         /^(MCC.?(編號|客戶編號)?|MCC.?ID)$/i,
    childName:       /^(兒童(中文)?姓名|小孩(全名|姓名)?|學生姓名|child.?name|全名)$/i,
    childEnglishName:/^(兒童英文姓名|英文(姓)?名|english.?name)$/i,
    parentName:      /^(家長(姓名|稱呼)?|parent.?name)$/i,
    parentContact:   /^(E.?mail|郵箱|電郵|帳號|email)$/i,
    parentPhone:     /^(連絡電話|聯絡電話|電話|手機|phone)$/i,
    childAge:        /^(兒童年齡|年齡|age)$/i,
    salesName:       /^(業務(人員)?|成交業務|邀約業務|salesperson|sales)$/i,
    siblings:        /^(兄弟姐妹|兄弟姊妹|siblings?)$/i,
    notes:           /^(備註|notes?)$/i,
    oikidUserId:     /^(UserID|user.?id)$/i,
    oikidRagicId:    /^(RagicUID|ragic.?(uid|id))$/i,
    joinDate:        /^(加入時間|建立時間|create.?at|created)$/i,
    childEnglishLevel: /^(課程|程度|商品|產品|目前課堂包|english.?level|level|product)$/i
  };

  const firstRow = rows[0] || [];
  const colMap = {}; // 欄位 → cols index
  let headerDetected = false;

  // 試著把第一行當 header 解析
  firstRow.forEach((cell, idx) => {
    const trimmed = (cell || '').trim();
    if (!trimmed) return;
    for (const [field, re] of Object.entries(headerKeywords)) {
      if (re.test(trimmed)) {
        colMap[field] = idx;
        headerDetected = true;
        break;
      }
    }
  });

  let parsed;
  if (headerDetected) {
    // ===== 用 header 對映欄位 =====
    const dataRows = rows.slice(1);
    parsed = dataRows.map(cols => {
      const get = (key) => colMap[key] !== undefined ? (cols[colMap[key]] || '').trim() : '';
      return {
        // CRM 欄位
        oikidUserId: get('oikidUserId'),
        oikidRagicId: get('oikidRagicId'),
        joinDate: get('joinDate'),
        parentName: get('parentName'),
        parentContact: get('parentContact'),
        parentPhone: get('parentPhone'),
        childName: get('childName'),
        childEnglishName: get('childEnglishName'),
        childAge: get('childAge'),
        childEnglishLevel: get('childEnglishLevel'),
        salesName: get('salesName'),
        // Ragic 額外資訊
        customerCode: get('customerCode'),
        mccCode: get('mccCode'),
        siblings: get('siblings'),
        importNotes: get('notes'),
        raw: cols
      };
    }).filter(r => r.parentContact || r.childName || r.parentName || r.oikidUserId || r.customerCode);
  } else {
    // ===== 沒 header,fallback 用 OIKID 後台順序 =====
    // (UserID, RagicUID, 加入時間, 帳號, 全名, 課程, 是否綁定, 聯絡電話, 業務, 班主任, %)
    parsed = rows.map(cols => {
      const [userId, ragicId, joinDate, email, fullName, course, bound, phone, sales] = cols;
      return {
        oikidUserId: (userId || '').trim(),
        oikidRagicId: (ragicId || '').trim(),
        joinDate: (joinDate || '').trim(),
        parentContact: (email || '').trim(),
        childName: (fullName || '').trim(),
        childEnglishLevel: (course || '').trim(),
        parentPhone: (phone || '').trim(),
        salesName: (sales || '').trim(),
        raw: cols
      };
    }).filter(r => r.oikidUserId || r.parentContact || r.childName);
  }

  if (parsed.length === 0) {
    document.getElementById('parseResult').innerHTML = `
      <div class="card">
        <h2>⚠️ 沒解析到資料</h2>
        <p>可能原因:</p>
        <ul style="margin-left:20px;">
          <li>資料格式不是 Tab 分隔(從 OIKID 網頁表格複製應該會是)</li>
          <li>欄位順序跟 OIKID 不同</li>
        </ul>
        <p>把原始貼上的內容前幾行給我看看,我調整解析邏輯。</p>
      </div>`;
    return;
  }

  // 找出新增 vs 更新 — 三層比對:oikidUserId > customerCode (Ragic) > email
  const existingByUserId = new Map();
  const existingByCustomerCode = new Map();
  const existingByEmail = new Map();
  db.customers.forEach(c => {
    if (c.oikidUserId) existingByUserId.set(c.oikidUserId, c);
    if (c.customerCode) existingByCustomerCode.set(c.customerCode, c);
    if (c.parentContact && c.parentContact.includes('@')) existingByEmail.set(c.parentContact.toLowerCase(), c);
  });

  // 給每筆 parsed 找對應的既有客戶
  parsed.forEach(p => {
    p._existing = (p.oikidUserId && existingByUserId.get(p.oikidUserId))
               || (p.customerCode && existingByCustomerCode.get(p.customerCode))
               || (p.parentContact && existingByEmail.get(p.parentContact.toLowerCase()))
               || null;
  });

  const newOnes = parsed.filter(p => !p._existing);
  const updates = parsed.filter(p => p._existing);

  document.getElementById('parseResult').innerHTML = `
    <div class="card">
      <h2>📋 解析結果 — 共 ${parsed.length} 筆</h2>
      <div style="display:flex;gap:10px;margin-bottom:14px;">

function confirmImport(parsed) {
  takeSnapshot('批次匯入前(' + (parsed ? parsed.length : 0) + ' 筆)');
  let added = 0, updated = 0, matchedDeleted = 0, promoted = 0;
  const matchDetail = [];
  const promotedNames = [];

  // 索引建立 — 兄弟姊妹會共用 customerCode/email/phone,所以家庭識別都要加「小孩名」
  // 唯一安全 1:1 → oikidUserId(每個小孩自己的 OIKID 帳號)
  const norm = s => (s || '').toString().trim().toLowerCase();
  const normPhone = s => (s || '').toString().replace(/\D/g, '');

  function buildMaps(wantDeleted) {
    const m = { uid: new Map(), np: new Map(), ne: new Map(), nm: new Map(), nc: new Map() };
    db.customers.forEach(c => {
      if (!!c._deleted !== wantDeleted) return;
      const cn = norm(c.childName) || norm(c.childEnglishName);
      const ph = normPhone(c.parentPhone);
      const em = norm(c.parentContact);
      if (c.oikidUserId) m.uid.set(c.oikidUserId.trim(), c);
      if (cn && ph) m.np.set(cn + '|' + ph, c);
      if (cn && em) m.ne.set(cn + '|' + em, c);
      if (cn && c.callCenterCode) m.nm.set(cn + '|' + c.callCenterCode.trim(), c);
      if (cn && c.customerCode) m.nc.set(cn + '|' + c.customerCode.trim(), c);
    });
    return m;
  }
  const active = buildMaps(false);
  const removed = buildMaps(true);

  function matchIn(m, p) {
    const cn = norm(p.childName) || norm(p.childEnglishName);
    const ph = normPhone(p.parentPhone);
    const em = norm(p.parentContact);
    return (p.oikidUserId && m.uid.get(p.oikidUserId.trim()))
      || (cn && ph && m.np.get(cn + '|' + ph))
      || (cn && em && m.ne.get(cn + '|' + em))
      || (cn && p.mccCode && m.nm.get(cn + '|' + p.mccCode.trim()))
      || (cn && p.customerCode && m.nc.get(cn + '|' + p.customerCode.trim()))
      || null;
  }

  parsed.forEach(p => {
    const existing = matchIn(active, p);
    const deletedHit = !existing && matchIn(removed, p);
    if (deletedHit) matchedDeleted++;
    matchDetail.push({
      家長: p.parentName || '',
      小孩: p.childName || '',
      mcc: p.mccCode || '',
      email: p.parentContact || '',
      配對: existing ? '更新' : (deletedHit ? '撞到已刪客戶' : '新增'),
      撞到的舊客戶: deletedHit ? `${deletedHit.parentName||''}/${deletedHit.childName||''} (id=${deletedHit.id})` : ''
    });

    if (existing) {
      // 更新:只覆蓋有值的欄位(空值不蓋掉舊資料)
      const update = {};
      if (p.oikidUserId) update.oikidUserId = p.oikidUserId;
      if (p.oikidRagicId) update.oikidRagicId = p.oikidRagicId;
      if (p.customerCode) update.customerCode = p.customerCode;
      if (p.mccCode) update.mccCode = p.mccCode;
      if (p.parentContact) update.parentContact = p.parentContact;
      if (p.parentName) update.parentName = p.parentName;
      if (p.parentPhone) update.parentPhone = p.parentPhone;
      if (p.childName) update.childName = p.childName;
      if (p.childEnglishName) update.childEnglishName = p.childEnglishName;
      if (p.childAge) update.childAge = p.childAge;
      if (p.childEnglishLevel) update.childEnglishLevel = p.childEnglishLevel;
      update.updatedAt = today();
      // 來自合約表單的 import 帶 customerCode 或 oikidUserId → 升級成交
      // (擷取書籤從 Ragic 合約表單來,通常只有 customerCode 沒 oikidUserId)
      const isContractRecord = !!(p.oikidUserId || p.customerCode);
      if (isContractRecord && existing.status !== '成交' && existing.status !== '流失') {
        const oldStatus = existing.status || '(空)';
        update.status = '成交';
        promoted++;
        promotedNames.push(`${existing.parentName||''}/${existing.childName||''} [${oldStatus}→成交]`);
      }
      Object.assign(existing, update);

      // 累加備註(業務人員、兄弟姐妹、import notes — 但不重複加)
      const noteAppend = [];
      if (p.salesName && !(existing.notes || '').includes(p.salesName)) {
        noteAppend.push('業務:' + p.salesName);
      }
      if (p.siblings && !(existing.notes || '').includes(p.siblings)) {
        noteAppend.push('兄弟姐妹:' + p.siblings);
      }
      if (p.importNotes && !(existing.notes || '').includes(p.importNotes)) {
        noteAppend.push(p.importNotes);
      }
      if (noteAppend.length) {
        existing.notes = (existing.notes || '') + (existing.notes ? '\n' : '') + noteAppend.join('\n');
      }
      updated++;
    } else {
      // 新增
      const noteParts = [];
      if (p.salesName) noteParts.push('業務:' + p.salesName);
      if (p.siblings) noteParts.push('兄弟姐妹:' + p.siblings);
      if (p.importNotes) noteParts.push(p.importNotes);

      db.customers.push({
        id: uid(),
        oikidUserId: p.oikidUserId || '',
        oikidRagicId: p.oikidRagicId || '',
        customerCode: p.customerCode || '',
        mccCode: p.mccCode || '',
        parentName: p.parentName || '',
        parentContact: p.parentContact || '',
        contactType: (p.parentContact || '').includes('@') ? 'Email' : '',
        childName: p.childName || '',
        childEnglishName: p.childEnglishName || '',
        childAge: p.childAge || '',
        childEnglishLevel: p.childEnglishLevel || '',
        parentPhone: p.parentPhone || '',
        status: (p.oikidUserId || p.customerCode) ? '成交' : '新名單',
        source: '',
        notes: noteParts.join('\n'),
        interactions: [],
        createdAt: p.joinDate ? p.joinDate.slice(0, 10) : today(),
        updatedAt: today()
      });
      added++;
    }
  });
  saveData();

  console.log('=== 批次匯入結果 ===');
  console.log({ 匯入筆數: parsed.length, 新增: added, 更新: updated, 升級成交: promoted, 撞到已刪客戶: matchedDeleted });
  console.table(matchDetail);
  if (promotedNames.length) console.log('🎉 升級成交:', promotedNames);
  console.log('現在 db.customers 總數:', db.customers.length,
    '其中已刪:', db.customers.filter(c => c._deleted).length,
    '可見:', db.customers.filter(c => !c._deleted).length,
    '可見且成交:', db.customers.filter(c => !c._deleted && c.status === '成交').length);

  let msg = `匯入完成\n\n新增 ${added} / 更新 ${updated}`;
  if (promoted) msg += `\n🎉 升級成交 ${promoted} 筆(原本在預約 tab,現在進客戶名單)`;
  if (matchedDeleted) msg += `\n⚠️ ${matchedDeleted} 筆撞到已刪客戶(會被當新增,不再被吃掉)`;
  msg += '\n\n(細節在 F12 console)';
  alert(msg);
  navigate('customers');
}

function renderTemplates(el) {

  });

  let html = `
    <div class="toolbar">
      <button class="btn btn-primary" onclick="openTemplateForm()">+ 新增範本</button>
      <button class="btn btn-secondary" onclick="resetTemplates()">↻ 還原預設範本</button>

    <div class="card">

        <code>{{level}}</code> 程度 ·
        <code>{{date}}</code> 日期 ·

  Object.keys(byCategory).forEach(cat => {

      html += `
        <div class="template-card">
          <h4>${escapeHtml(t.title)}</h4>
          <div class="preview">${escapeHtml(t.content)}</div>
          <div class="actions">
            <button class="btn btn-secondary btn-sm" onclick="openTemplateForm('${t.id}')">✏️ 編輯</button>

  el.innerHTML = html;
}

function openTemplateForm(id) {
  const t = id ? db.templates.find(x => x.id === id) : { id: uid(), title: '', category: '其他', content: '' };
  showModal(`
    <h2>${id ? '✏️ 編輯範本' : '➕ 新增範本'}</h2>
    <div class="form-grid">
      <div class="form-group"><label>標題</label><input id="t_title" value="${escapeHtml(t.title)}"></div>
      <div class="form-group"><label>分類</label>
        <input id="t_category" value="${escapeHtml(t.category)}" list="categoryList">
        <datalist id="categoryList">
          <option value="介紹"><option value="邀約"><option value="提醒">
          <option value="跟進"><option value="報價"><option value="續約"><option value="其他">
        </datalist>
      </div>
      <div class="form-group full"><label>內容 (可用 {{parent}} {{child}} {{age}} 等變數)</label>
        <textarea id="t_content" rows="10">${escapeHtml(t.content)}</textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveTemplate('${t.id}', ${!id})">💾 儲存</button>
    </div>
  `);
}

function saveTemplate(id, isNew) {
  const data = {
    id,
    title: val('t_title'),
    category: val('t_category') || '其他',
    content: val('t_content')
  };
  if (!data.title || !data.content) { alert('標題跟內容都要填'); return; }
  db.templates = db.templates || [];
  if (isNew) db.templates.push(data);
  else {
    const idx = db.templates.findIndex(x => x.id === id);
    db.templates[idx] = data;
  }
  saveData();
  closeModal();
  render();
  toast('範本已儲存');
}

function deleteTemplate(id) {
  if (!confirm('刪除這個範本?')) return;
  db.templates = db.templates.filter(t => t.id !== id);
  saveData();
  render();
  toast('已刪除');
}

function resetTemplates() {
  if (!confirm('會把內建的 8 個範本加回來(不會刪除你自訂的),確定?')) return;
  const existingIds = new Set((db.templates || []).map(t => t.id));
  DEFAULT_TEMPLATES.forEach(t => {
    if (!existingIds.has(t.id)) db.templates.push({...t});
  });
  saveData();
  render();
  toast('預設範本已補齊');
}

const BM_DEMO_FETCH = `javascript:(async()=>{try{const hash=location.hash||'';const m=hash.match(/trial_query\\?(.+)/);let queryNames=[];if(m){const p=new URLSearchParams(m[1]);const n=p.get('names')||'';queryNames=n.split('|').filter(Boolean).map(s=>decodeURIComponent(s).trim().toLowerCase());}if(!queryNames.length){const c=prompt('輸入學員名字(中/英/家長名)搜尋:');if(!c)return;queryNames=[c.trim().toLowerCase()];}const rows=[...document.querySelectorAll('table tbody tr')].filter(tr=>tr.querySelectorAll('td').length>=7);if(!rows.length){alert('❌ 找不到 DEMO 紀錄表格,請確認在 Sales/DemoRecord 頁');return;}const candidates=rows.filter(tr=>{const tds=tr.querySelectorAll('td');const sName=((tds[6]&&tds[6].innerText)||'').toLowerCase().trim();return queryNames.some(qn=>qn&&sName.includes(qn));}).slice(0,15);if(!candidates.length){alert('❌ 找不到符合的學員\\n\\n搜尋:'+queryNames.join('、')+'\\n\\n請確認:1) 在 OIKID 那邊用哪個名字 2) 試聽紀錄已出現在這頁');return;}let selectedRow;if(candidates.length===1){selectedRow=candidates[0];}else{const list=candidates.map((tr,i)=>{const tds=tr.querySelectorAll('td');const time=((tds[3]&&tds[3].innerText)||'').trim();const teacher=((tds[5]&&tds[5].innerText)||'').trim();const student=((tds[6]&&tds[6].innerText)||'').trim();return(i+1)+'. '+time+' | '+teacher+' | '+student;}).join('\\n');const pick=prompt('找到 '+candidates.length+' 筆候選,輸入編號(1-'+candidates.length+'):\\n\\n'+list);const idx=parseInt(pick)-1;if(isNaN(idx)||idx<0||idx>=candidates.length){alert('已取消');return;}selectedRow=candidates[idx];}const tds=selectedRow.querySelectorAll('td');const teacher=((tds[5]&&tds[5].innerText)||'').trim();const startTime=((tds[3]&&tds[3].innerText)||'').trim();const student=((tds[6]&&tds[6].innerText)||'').trim();const lastTd=tds[tds.length-1];let ratingBtn=lastTd&&(lastTd.querySelector('a')||lastTd.querySelector('button')||lastTd.querySelector('[onclick]')||lastTd.querySelector('i')||lastTd.querySelector('.btn'));if(!ratingBtn){alert('❌ 找不到顧問評分按鈕(在最後一欄)');return;}ratingBtn.click();await new Promise(r=>setTimeout(r,800));let waited=0,modalEl=null;while(waited<5000){const candidates2=document.querySelectorAll('.modal.show,.modal.in,[role="dialog"],.swal2-popup,.popup,.dialog');for(const el of candidates2){if(el.offsetParent!==null&&el.innerText.indexOf('Level')>=0){modalEl=el;break;}}if(!modalEl){const all=document.querySelectorAll('div');for(const el of all){if(el.offsetParent===null)continue;const t=el.innerText||'';if(t.indexOf('Level')>=0&&t.indexOf('Assess')>=0&&t.length<5000){modalEl=el;break;}}}if(modalEl)break;await new Promise(r=>setTimeout(r,200));waited+=200;}if(!modalEl){alert('❌ 顧問評分 modal 沒偵測到。\\n\\n手動試:點顧問評分 icon → 看 modal 開啟 → 重跑書籤');return;}let level='';const allText=modalEl.innerText;const lvMatch=allText.match(/Lv\\s*(\\d+)/);if(lvMatch)level=lvMatch[1];let assess='';const textareas=modalEl.querySelectorAll('textarea');for(const t of textareas){const v=(t.value||t.innerText||'').trim();if(v.length>30){assess=v;break;}}if(!assess&&textareas.length)assess=(textareas[textareas.length-1].value||textareas[textareas.length-1].innerText||'').trim();const closeBtn=modalEl.querySelector('.close,[aria-label="close"],[aria-label="Close"],button.btn-close')||document.querySelector('.modal.show .close,.modal.in .close');if(closeBtn)closeBtn.click();const result={teacher:teacher,level:level,assess:assess,startTime:startTime,student:student};const json=JSON.stringify(result,null,2);let copied=false;try{await navigator.clipboard.writeText(json);copied=true;}catch(e){try{const ta=document.createElement('textarea');ta.value=json;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();copied=true;}catch(e2){}}alert('✅ 已抓取!'+(copied?' (JSON 已複製到剪貼簿)':' (剪貼簿失敗,看 Console)')+'\\n\\n老師:'+teacher+'\\n等級:Lv '+level+'\\n時間:'+startTime+'\\n評語:'+(assess.slice(0,80)+(assess.length>80?'...':''))+'\\n\\n切回 CRM 試聽完成 modal → 點「📋 從剪貼簿讀」自動填入。');if(!copied)console.log(json);}catch(e){alert('❌ 錯誤:'+e.message);console.error(e);}})();`;

// ============ Call Center 派發名單匯入 ============
function importCallCenterData() {
  const ta = document.getElementById('cc_import_json');
  const raw = (ta && ta.value || '').trim();
  if (!raw) { alert('請先貼上 JSON'); return; }
  let arr;
  try { arr = JSON.parse(raw); }
  catch (e) { alert('❌ JSON 解析失敗:' + e.message); return; }
  if (!Array.isArray(arr)) { alert('❌ 格式錯誤:應是陣列'); return; }
  if (arr.length === 0) { alert('陣列是空的'); return; }

  const existingByCode = new Map();
  activeCustomers().forEach(c => {
    if (c.callCenterCode) existingByCode.set(c.callCenterCode, c);
  });

  let added = 0, updated = 0, skipped = 0;
  const newNames = [], updatedNames = [];

  arr.forEach(p => {
    const code = (p.callCenterCode || '').trim();
    if (!code) { skipped++; return; }

    const existing = existingByCode.get(code);
    if (existing) {
      const idx = db.customers.findIndex(c => c.id === existing.id);
      if (idx >= 0) {
        db.customers[idx].callCenterMemo = p.callCenterMemo || '';
        db.customers[idx].updatedAt = today();
        // 補回:既有客戶若沒電話而 Call Center 有,補上
        if (!db.customers[idx].parentPhone && p.phone) {
          db.customers[idx].parentPhone = p.phone;
        }
        updated++;
        updatedNames.push(p.name || code);
      }
    } else {
      const assignedDate = (p.assignedAt || '').slice(0, 10) || today();
      db.customers.push({
        id: uid(),
        callCenterCode: code,
        callCenterMemo: p.callCenterMemo || '',
        parentName: p.name || '',
        parentContact: p.email || '',
        contactType: (p.email || '').includes('@') ? 'Email' : '',
        parentPhone: p.phone || '',
        childName: p.childName || '',
        childAge: p.childAge || '',
        source: p.source || '',
        status: '新名單',
        notes: '',
        interactions: [],
        createdAt: assignedDate,
        updatedAt: today()
      });
      added++;
      newNames.push(p.name || code);
    }
  });

  saveData();

  let msg = `✅ 匯入完成!\n\n新增 ${added} 筆 / 更新 ${updated} 筆`;
  if (skipped) msg += ` / 跳過 ${skipped} 筆(無客戶編號)`;
  if (added) msg += `\n\n新增:\n${newNames.slice(0, 10).join('、')}${added > 10 ? '...' : ''}`;
  if (updated) msg += `\n\n更新備註:\n${updatedNames.slice(0, 10).join('、')}${updated > 10 ? '...' : ''}`;
  alert(msg);
  ta.value = '';
  navigate('prospects');
}

// ============ Ragic PoC: 讀取測試 ============
// 透過 window.postMessage 跟擴充 crm-content.js 溝通(避開 CSP inline script 擋)
// crm-content.js 收到後轉給 background.js fetch Ragic API。
// 需擴充 v4.2.1+ 已加入 postMessage 'ragic-fetch-req' handler。
function ragicFetchViaExt(url, opts) {
  return new Promise(function (resolve) {
    var reqId = 'rg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    var timeoutMs = (opts && opts.timeout) || 30000;
    function onMsg(e) {
      if (e.source !== window) return;
      if (!e.data || e.data._oikid !== 'ragic-fetch-resp') return;
      if (e.data.reqId !== reqId) return;
      window.removeEventListener('message', onMsg);
      resolve(e.data);
    }
    window.addEventListener('message', onMsg);
    window.postMessage({
      _oikid: 'ragic-fetch-req',
      reqId: reqId,
      url: url,
      method: (opts && opts.method) || 'GET',
      body: (opts && opts.body) || null
    }, '*');
    setTimeout(function () {
      window.removeEventListener('message', onMsg);
      resolve({ ok: false, error: 'timeout 超過 ' + (timeoutMs / 1000) + ' 秒(擴充可能沒裝/沒啟用/沒重新載入,或 Ragic 回應太慢 — 試試縮小資料範圍)' });
    }, timeoutMs);
  });
}

// ============ 完整版「試聽完成」一鍵寫入 ============
// 一發 POST 寫 4 個欄位:出席結果(1001548) + 老師(1001550) + Lv(1001552) + DEMO 結果(1001554)
async function submitTrialCompleteFromPoC() {
  const recordId = (document.getElementById('tc_record_id').value || '').trim();
  const teacher = (document.getElementById('tc_teacher').value || '').trim();
  const level = (document.getElementById('tc_level').value || '').trim();
  const demoResult = (document.getElementById('tc_demo_result').value || '').trim();
  const resultEl = document.getElementById('poc_ragic_result');

  if (!recordId) { alert('請填 Record ID'); return; }
  if (!teacher) { alert('請填老師'); return; }

  const summary = '出席結果 = 已出席\n老師 = ' + teacher + '\n學生程度 Lv = ' + level + '\nDEMO 結果 = ' + (demoResult || '(空)');
  if (!confirm('要把 Ragic record ' + recordId + ' 的這 4 個欄位寫入?\n\n' + summary + '\n\n會真的寫入,測完去 Ragic 看結果。')) return;

  resultEl.style.display = 'block';

  const url = 'https://ap7.ragic.com/oikid/forms/2/' + encodeURIComponent(recordId) + '?api';

  // form 2 (OiKID Demo 表單) 已知欄位 ID
  const fields = {
    '1001548': '已出席',     // 出席結果
    '1001550': teacher,       // 老師 Teacher
    '1001552': level,         // 學生程度 Level
    '1001554': demoResult     // DEMO 結果
  };
  const body = Object.keys(fields).map(function(k){
    return k + '=' + encodeURIComponent(fields[k]);
  }).join('&');

  resultEl.textContent = '⏳ 寫入 4 個欄位中...\nMethod: POST\nURL: ' + url + '\nBody: ' + body;
  toast('⏳ 寫入試聽完成中...');

  try {
    const resp = await ragicFetchViaExt(url, { method: 'POST', body: body });

    let display = 'URL: ' + url + '\n';
    display += 'Method: POST\n';
    display += 'Body: ' + body + '\n';
    display += 'HTTP Status: ' + resp.status + '\n';
    display += 'OK: ' + resp.ok + '\n';
    if (resp.error) display += 'Error: ' + resp.error + '\n';
    display += '\n--- Response ---\n';
    if (resp.data) {
      display += JSON.stringify(resp.data, null, 2);
    } else if (resp.rawText) {
      display += '(非 JSON)\n' + resp.rawText;
    }

    resultEl.textContent = display;

    var ragicMsg = (resp.data && resp.data.msg ? String(resp.data.msg) : '').replace(/&nbsp;/g, '').trim();
    var isTrueSuccess = resp.ok && resp.data && resp.data.status === 'SUCCESS' && !ragicMsg.toLowerCase().includes('not found');

    if (isTrueSuccess) {
      toast('✅ 試聽完成已寫入 Ragic!去 Ragic 重整看 4 個欄位');
    } else if (resp.ok && ragicMsg) {
      toast('⚠️ Ragic 警告:' + ragicMsg.slice(0, 60));
    } else {
      toast('❌ 寫入失敗,看 Response');
    }
  } catch (err) {
    resultEl.textContent = '❌ 例外:' + (err && err.message ? err.message : String(err));
    toast('❌ 寫入錯誤');
  }
}

function renderStats(el) {
  const all = activeCustomers();

  STATUSES.forEach(s => byStatus[s] = 0);
  all.forEach(c => byStatus[c.status] = (byStatus[c.status] || 0) + 1);

  const thisMonth = today().slice(0, 7);
  const newThisMonth = all.filter(c => (c.createdAt || '').startsWith(thisMonth)).length;
  const closedThisMonth = all.filter(c =>
    c.status === '成交' && (c.updatedAt || '').startsWith(thisMonth)
  ).length;
  const closeRate = total > 0 ? ((byStatus['成交'] / total) * 100).toFixed(1) : 0;

  const bySource = {};

            4. 來這個分頁 → 點「🔗 連結既有檔案」→ 選同步資料夾的 <code>oikid-data.json</code><br>
            5. 跳「用雲端覆蓋本機?」→ 按「確定」→ 你的 300 位客戶就出現了 🎉<br><br>
            <b>備援:不想用 File System API 也可以用最下面的「下載備份」+「匯入」手動同步</b>
          </div>
        </details>
      `}
    </div>

    <div class="card">
      <h2>💾 手動匯出 / 匯入</h2>
      <div class="hint">如果不想用上面的雲端同步,可以手動下載 JSON,自己放雲端資料夾</div>
      <button class="btn btn-primary" onclick="exportData()">⬇️ 下載完整備份 (JSON)</button>
      <button class="btn btn-secondary" onclick="exportCSV()" style="margin-left:10px;">⬇️ 下載客戶 CSV</button>
      <div style="margin-top:14px;">
        <input type="file" id="importFile" accept=".json">
        <button class="btn btn-danger" onclick="importData()" style="margin-left:10px;">📥 匯入並覆蓋</button>
      </div>
    </div>
    <div class="card">
      <h2>🗑️ 清空</h2>
      <button class="btn btn-danger" onclick="clearAll()">清空所有客戶資料</button>
    </div>
  `;
}

function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `oikid_backup_${today()}.json`;
  a.click();
}

function exportCSV() {
  const headers = ['UserID','RagicUID','小孩全名','家長','Email','電話','年齡','產品','來源','狀態','下次跟進','備註','建立日','更新日'];
  const rows = activeCustomers().map(c => [
    c.oikidUserId, c.oikidRagicId, c.childName, c.parentName, c.parentContact, c.parentPhone,
    c.childAge, c.childEnglishLevel, c.source, c.status, c.nextFollowUp, c.notes, c.createdAt, c.updatedAt
  ].map(v => `"${(v || '').toString().replace(/"/g, '""').replace(/\n/g, ' ')}"`).join(','));
  const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `oikid_customers_${today()}.csv`;
  a.click();
}

function importData() {
  const file = document.getElementById('importFile').files[0];
  if (!file) { alert('請選擇檔案'); return; }
  if (!confirm('確定要覆蓋目前所有資料?')) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.customers) throw new Error('格式錯誤');
      db = data;
      if (!db.templates) db.templates = [...DEFAULT_TEMPLATES];
      saveData();
      alert(`已匯入 ${db.customers.length} 筆客戶`);
      render();
    } catch (e) { alert('檔案格式不正確:' + e.message); }
  };
  reader.readAsText(file);
}

function clearAll() {
  if (!confirm('清空全部客戶資料?(範本會保留)')) return;
  if (!confirm('真的確定?無法還原!')) return;
  db.customers = [];
  saveData();
  render();
  toast('已清空');
}

// ============ Modal ============
function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal').onclick = e => {
  if (e.target.id === 'modal') closeModal();
};

// ============ 同步狀態徽章 ============
function renderSyncBadge() {
  const el = document.getElementById('syncBadge');
  const lab = document.getElementById('syncBadgeLabel');
  if (!el || !lab) return;
  el.classList.remove('idle','synced','saving','dirty','error','local');
  let cls = 'idle', text = '未同步';
  if (SYNC_STATE === 'synced') {
    cls = 'synced';
    const t = SYNC_LAST_SAVED_AT;
    text = '已同步' + (t ? ' · ' + t.toTimeString().slice(0,5) : '');
  } else if (SYNC_STATE === 'saving') {
    cls = 'saving'; text = '寫入雲端中...';
  } else if (SYNC_STATE === 'dirty') {
    cls = 'dirty'; text = '尚未寫入雲端';
  } else if (SYNC_STATE === 'error') {
    cls = 'error'; text = '同步失敗 ⚠';
  } else if (SYNC_STATE === 'local') {
    cls = 'local'; text = '純本機(未連雲端)';
  }
  el.classList.add(cls);
  lab.textContent = text;
  el.title = SYNC_ERROR_MSG ? ('上次錯誤:' + SYNC_ERROR_MSG + '\n點擊到備份頁') : '點擊查看雲端同步狀態';
}
document.getElementById('syncBadge').onclick = () => navigate('backup');

// ============ 全域搜尋面板 (Cmd+K) ============
let cmdkSelectedIdx = 0;
let cmdkResults = [];

function buildCmdkResults(q) {
  const query = q.toLowerCase().trim();
  const out = [];

  // 1. 頁面導向
  const views = [
    {view:'today', label:'📅 行事曆', sub:'查看月曆'},
    {view:'customers', label:'👥 客戶名單', sub:'瀏覽所有客戶'},
    {view:'import', label:'📥 批次匯入', sub:'從 Ragic / OIKID 匯入客戶'},
    {view:'templates', label:'💬 訊息範本', sub:'管理回覆訊息'},
    {view:'oikidsync', label:'🔗 OIKID 串接', sub:'安裝書籤腳本'},
    {view:'stats', label:'📊 統計', sub:'查看數字總覽'},
    {view:'backup', label:'💾 備份', sub:'雲端同步 / 匯出'}
  ];
  views.forEach(v => {
    if (!query || v.label.toLowerCase().includes(query) || v.sub.toLowerCase().includes(query)) {
      out.push({type:'view', icon:'→', title:v.label, sub:v.sub, action:()=>{ closeCmdk(); navigate(v.view); }});
    }
  });

  // 2. 客戶
  if (query) {
    const matches = activeCustomers().filter(c => {
      const hay = [c.childName, c.childEnglishName, c.parentName, c.parentContact,
        c.parentPhone, c.oikidUserId, c.customerCode, c.notes].join(' ').toLowerCase();
      return hay.includes(query);
    }).slice(0, 12);
    matches.forEach(c => {
      const name = c.childName || c.parentName || '(未命名)';
      const sub = [c.parentName, c.parentContact || c.parentPhone, c.status]
        .filter(Boolean).join(' · ');
      out.push({type:'customer', icon:'👶', title:name, sub, action:()=>{ closeCmdk(); openCustomer(c.id); }});
    });
  } else {
    // 空 query 時:顯示最近更新的 5 位客戶當捷徑
    const recent = activeCustomers()
      .slice()
      .sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''))
      .slice(0, 5);
    recent.forEach(c => {
      const name = c.childName || c.parentName || '(未命名)';
      const sub = '最近更新 ' + (c.updatedAt || '—') + ' · ' + (c.status || '');
      out.push({type:'customer', icon:'👶', title:name, sub, action:()=>{ closeCmdk(); openCustomer(c.id); }});
    });
  }

  // 3. 行事曆事件(只在有 query 時搜)
  if (query) {
    const evMatches = activeCalendarEvents().filter(ev => {
      return (ev.title || '').toLowerCase().includes(query) ||
             (ev.note || '').toLowerCase().includes(query) ||
             (ev.date || '').includes(query);
    }).slice(0, 8);
    evMatches.forEach(ev => {
      const sub = (ev.date || '') + (ev.time ? ' ' + ev.time : '') + (ev.note ? ' · ' + ev.note.slice(0, 40) : '');
      out.push({type:'event', icon:'📅', title:ev.title || '(無標題)', sub, action:()=>{ closeCmdk(); openCalendarEventForm(ev.id); }});
    });
  }

  return out;
}

function renderCmdkResults() {
  const box = document.getElementById('cmdkResults');
  if (!box) return;
  if (cmdkResults.length === 0) {
    box.innerHTML = '<div class="cmdk-empty">沒有符合的結果</div>';
    return;
  }
  // 分組
  const groups = {view:[], customer:[], event:[]};
  cmdkResults.forEach((r, idx) => { r._idx = idx; groups[r.type].push(r); });

  const queryNow = (document.getElementById('cmdkInput')?.value || '').trim();
  const customerTitle = queryNow ? '👥 客戶' : '👥 最近更新的客戶';

  let html = '';
  const sections = [
    {key:'view', title:'🧭 頁面'},
    {key:'customer', title: customerTitle},
    {key:'event', title:'📅 行事曆'}
  ];
  sections.forEach(sec => {
    if (groups[sec.key].length === 0) return;
    html += `<div class="cmdk-section-title">${sec.title}</div>`;
    groups[sec.key].forEach(r => {
      const sel = r._idx === cmdkSelectedIdx ? ' selected' : '';
      html += `
        <div class="cmdk-item${sel}" data-idx="${r._idx}">
          <div class="cmdk-item-icon">${r.icon}</div>
          <div class="cmdk-item-body">
            <div class="cmdk-item-title">${escapeHtml(r.title)}</div>
            <div class="cmdk-item-sub">${escapeHtml(r.sub || '')}</div>
          </div>
        </div>
      `;
    });
  });
  box.innerHTML = html;

  // 綁 click
  box.querySelectorAll('.cmdk-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = Number(el.dataset.idx);
      if (cmdkResults[idx]) cmdkResults[idx].action();
    });
    el.addEventListener('mouseenter', () => {
      cmdkSelectedIdx = Number(el.dataset.idx);
      // 不重 render(避免閃),用 class 切就好
      box.querySelectorAll('.cmdk-item').forEach(x => x.classList.toggle('selected', Number(x.dataset.idx) === cmdkSelectedIdx));
    });
  });

  // 確保選中項可見
  const cur = box.querySelector('.cmdk-item.selected');
  if (cur && cur.scrollIntoView) cur.scrollIntoView({block:'nearest'});
}

function refreshCmdk() {
  const q = document.getElementById('cmdkInput').value;
  cmdkResults = buildCmdkResults(q);
  cmdkSelectedIdx = 0;
  renderCmdkResults();
}

function openCmdk() {
  const overlay = document.getElementById('cmdkOverlay');
  overlay.classList.add('show');
  const inp = document.getElementById('cmdkInput');
  inp.value = '';
  refreshCmdk();
  setTimeout(() => inp.focus(), 0);
}
function closeCmdk() {
  document.getElementById('cmdkOverlay').classList.remove('show');
}

document.getElementById('cmdkBtn').onclick = openCmdk;
document.getElementById('cmdkOverlay').onclick = (e) => {
  if (e.target.id === 'cmdkOverlay') closeCmdk();
};
document.getElementById('cmdkInput').addEventListener('input', refreshCmdk);
document.getElementById('cmdkInput').addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    cmdkSelectedIdx = Math.min(cmdkResults.length - 1, cmdkSelectedIdx + 1);
    renderCmdkResults();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    cmdkSelectedIdx = Math.max(0, cmdkSelectedIdx - 1);
    renderCmdkResults();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const r = cmdkResults[cmdkSelectedIdx];
    if (r) r.action();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    closeCmdk();
  }
});

// 全域熱鍵 Ctrl/Cmd + K
document.addEventListener('keydown', (e) => {
  const isK = e.key === 'k' || e.key === 'K';
  if (isK && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    const overlay = document.getElementById('cmdkOverlay');
    if (overlay.classList.contains('show')) closeCmdk();
    else openCmdk();
  } else if (e.key === 'Escape') {
    if (document.getElementById('cmdkOverlay').classList.contains('show')) closeCmdk();
  }
});

// ============ 行事曆事件提醒 ============
// 混合模式:
//   1. 優先用 Notification API(只在 http(s):// 才能用,file:// 會被 Chrome 擋)
//   2. 不論成不成功,都會顯示頁面內提醒卡(右上角)+ 改瀏覽器分頁標題
// 這樣 file:// 開的也能看到提醒,只是必須有工作台分頁開著
function requestNotificationPermission() {
  if (!('Notification' in window)) {
    toast('⚠️ 這個瀏覽器不支援桌面通知,但頁面內提醒仍會生效');
    return;
  }
  // file:// 開的會直接 reject,permission 永遠停在 default
  if (location.protocol === 'file:') {
    toast('⚠️ file:// 路徑下 Chrome 不允許桌面通知,但提醒會以「分頁標題 + 頁面卡片」呈現');
    return;
  }
  if (Notification.permission === 'granted') {
    toast('🔔 通知已啟用');
    return;
  }
  Notification.requestPermission().then(p => {
    if (p === 'granted') toast('✅ 通知已啟用');
    else toast('⚠️ 通知被拒絕,但頁面內提醒仍會生效');
  });
}

// 計算事件預定觸發時間 (Date)。事件須有 time + reminderMinutes>0,否則回 null
function reminderFireTime(ev) {
  if (!ev || !ev.time || !ev.date) return null;
  const mins = Number(ev.reminderMinutes || 0);
  if (!mins || mins <= 0) return null;
  const t = new Date(ev.date + 'T' + ev.time + ':00');
  if (isNaN(t.getTime())) return null;
  return new Date(t.getTime() - mins * 60000);
}

// ===== 頁面內提醒系統 =====
// 維護目前未處理的提醒(使用者沒按關閉的)→ 控制分頁標題的紅點計數
const _activeReminders = new Set();
const _origTitle = document.title;

function refreshTitleBadge() {
  if (_activeReminders.size > 0) {
    document.title = '🔔 (' + _activeReminders.size + ') ' + _origTitle;
  } else {
    document.title = _origTitle;
  }
}

function showReminderCard(ev, cust) {
  let stack = document.getElementById('reminder-stack');
  if (!stack) {
    stack = document.createElement('div');
    stack.id = 'reminder-stack';
    stack.style.cssText = 'position:fixed;top:78px;right:20px;z-index:5000;display:flex;flex-direction:column;gap:10px;max-width:340px;pointer-events:none;';
    document.body.appendChild(stack);
  }

  const card = document.createElement('div');
  card.style.cssText = 'pointer-events:auto;background:white;border-radius:10px;box-shadow:0 6px 20px rgba(15,23,42,0.18);border-left:4px solid #dc2626;padding:14px 16px;animation:reminderSlide 0.3s ease;';
  const custName = cust ? (cust.childName || cust.parentName || '') : '';
  card.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
      <div style="flex:1;min-width:0;">
        <div style="font-weight:bold;font-size:15px;margin-bottom:4px;color:#dc2626;">🔔 ${escapeHtml(ev.title || '事件提醒')}</div>
        <div style="font-size:13px;color:var(--text-soft);">⏰ ${escapeHtml(ev.time || '')} · 還有 <span data-mins-left>—</span> 分鐘</div>
        ${custName ? `<div style="font-size:13px;margin-top:4px;color:var(--primary);cursor:pointer;" data-customer-jump>👤 ${escapeHtml(custName)} →</div>` : ''}
        ${ev.note ? `<div style="font-size:12px;color:var(--text-muted);margin-top:6px;white-space:pre-line;">${escapeHtml(ev.note.slice(0, 200))}</div>` : ''}
      </div>
      <button class="btn btn-secondary btn-sm" data-dismiss style="flex-shrink:0;">×</button>
    </div>
  `;

  // 計算還有多久(每 10 秒更新)
  const eventTime = new Date(ev.date + 'T' + ev.time + ':00').getTime();
  const minsSpan = card.querySelector('[data-mins-left]');
  function updateMinsLeft() {
    const left = Math.round((eventTime - Date.now()) / 60000);
    if (left > 0) minsSpan.textContent = String(left);
    else if (left === 0) minsSpan.textContent = '快開始';
    else { minsSpan.textContent = '已過 ' + Math.abs(left); minsSpan.style.color = '#dc2626'; }
  }
  updateMinsLeft();
  const minsTimer = setInterval(updateMinsLeft, 10000);

  // 關閉按鈕
  card.querySelector('[data-dismiss]').onclick = () => {
    clearInterval(minsTimer);
    card.remove();
    _activeReminders.delete(ev.id);
    refreshTitleBadge();
  };

  // 點客戶名跳客戶詳情
  if (cust) {
    const jump = card.querySelector('[data-customer-jump]');
    if (jump) jump.onclick = () => { openCustomer(cust.id); };
  }

  stack.appendChild(card);

  // 30 分鐘後自動消失(避免堆積過多)
  setTimeout(() => {
    if (card.parentNode) {
      clearInterval(minsTimer);
      card.remove();
      _activeReminders.delete(ev.id);
      refreshTitleBadge();
    }
  }, 30 * 60 * 1000);
}

function checkReminders() {
  const now = Date.now();
  const events = activeCalendarEvents();
  let dirty = false;
  events.forEach(ev => {
    if (ev._notified) return;
    const fire = reminderFireTime(ev);
    if (!fire) return;
    const eventTime = new Date(ev.date + 'T' + ev.time + ':00').getTime();
    // 觸發條件:現在已超過提醒時間,但事件本身還沒過(過了就不通知)
    if (now >= fire.getTime() && now < eventTime) {
      const cust = ev.customerId ? db.customers.find(x => x.id === ev.customerId) : null;
      const custName = cust ? (cust.childName || cust.parentName || '') : '';

      // 1. 優先試 Notification API(http/https 才有效)
      let nativeOk = false;
      if ('Notification' in window && Notification.permission === 'granted') {
        try {
          const body = (ev.time ? ev.time + ' · ' : '')
            + (custName ? '👤 ' + custName + '\n' : '')
            + (ev.note || '');
          const n = new Notification('🔔 ' + (ev.title || '事件提醒'), {
            body: body || '行事曆事件即將開始',
            tag: 'oikid_ev_' + ev.id,
            requireInteraction: false
          });
          n.onclick = () => { window.focus(); if (cust) openCustomer(cust.id); n.close(); };
          nativeOk = true;
        } catch (e) { console.warn('Notification 失敗,fallback 到頁面內:', e); }
      }

      // 2. 不論成不成功,一律加頁面內提醒卡(就算桌面通知有跳,工具沒切回來也看不到桌面)
      try {
        showReminderCard(ev, cust);
        _activeReminders.add(ev.id);
        refreshTitleBadge();
      } catch (e) { console.error('頁面提醒失敗:', e); }

      // 提示音(短嗶,純頁面內)
      if (!nativeOk) {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880; gain.gain.value = 0.05;
          osc.start(); osc.stop(ctx.currentTime + 0.15);
        } catch (eAudio) {}
      }

      ev._notified = true;
      dirty = true;
    }
  });
  if (dirty) saveData();
}

// 每 15 秒檢查一次(使用者設「提前 1 分鐘」也能準時跳)
setInterval(checkReminders, 15000);
// 啟動後 2 秒做第一次檢查
setTimeout(checkReminders, 2000);

// ============ 啟動 ============
render();
renderSyncBadge();

// 嘗試自動重連先前連結的雲端檔案(權限若已授予)
reconnectSyncFile().then(ok => {
  if (ok) {
    console.log('[Sync] Auto-reconnected to', syncFileName);
    setSyncState('synced');
    if (currentView === 'backup') render();
  } else {
    setSyncState(syncFileHandle ? 'synced' : 'local');
  }
});
